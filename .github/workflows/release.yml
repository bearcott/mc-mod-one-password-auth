# Automatically builds and publishes a release when a new tag is pushed.
# NOTE: Set up MODRINTH_TOKEN and MODRINTH_PROJECT_ID in the repository secrets and variables respectively before using this workflow.
# commit changes then push via `git tag v1.0.* && git push origin v1.0.*`

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build mod
        env:
          MOD_VERSION: ${{ steps.version.outputs.VERSION }}
        run: ./gradlew build

      - name: Find JAR
        id: jar
        run: |
          JAR=$(ls build/libs/*.jar | grep -v '\-dev\|-sources\|-shadow' | head -n 1)
          echo "PATH=$JAR" >> $GITHUB_OUTPUT
          echo "NAME=$(basename $JAR)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          files: ${{ steps.jar.outputs.PATH }}
          generate_release_notes: true

      - name: Extract Game Version from Properties
        id: game_version
        run: |
          VERSION=$(grep 'minecraft_version' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "GAME_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to GitHub & Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: ${{ steps.jar.outputs.PATH }}
          version: ${{ steps.version.outputs.VERSION }}
          version-type: release
          game-versions: ${{ steps.game_version.outputs.GAME_VERSION }}
          loaders: fabric
          java: 21

      - name: Sync Modrinth project description from README
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
        run: |
          jq -n --rawfile body README.md '{body: $body}' | \
            curl -fsS -X PATCH "https://api.modrinth.com/v2/project/$MODRINTH_PROJECT_ID" \
              -H "Authorization: $MODRINTH_TOKEN" \
              -H "Content-Type: application/json" \
              -d @-
