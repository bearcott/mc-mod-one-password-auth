# Automatically builds and publishes a release when a new tag is pushed.
# NOTE: Set up MODRINTH_TOKEN and MODRINTH_PROJECT_ID in the repository secrets and variables respectively before using this workflow.

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build mod
        run: ./gradlew build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Find JAR
        id: jar
        run: |
          JAR=$(ls build/libs/*.jar | grep -v '\-dev\|-sources\|-shadow' | head -n 1)
          echo "PATH=$JAR" >> $GITHUB_OUTPUT
          echo "NAME=$(basename $JAR)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          files: ${{ steps.jar.outputs.PATH }}
          generate_release_notes: true

      - name: Publish to GitHub & Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: ${{ steps.jar.outputs.PATH }}
          version: ${{ steps.version.outputs.VERSION }}
          version-type: release
          game-versions: 1.21.1
          loaders: fabric
          java: 21
